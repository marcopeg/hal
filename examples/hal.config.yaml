providers:
  cursor: null
  claude: null
  codex: null
  opencode: null
  antigravity: null
  copilot:
    - name: gpt-5-mini
      default: true
    - name: gpt-5.2
    - name: gpt-5.1-codex-mini
    - name: gpt-5.3-codex
globals:
  telegram:
    message:
      # Optional inbound text quiet window for Telegram message stitching.
      # The task-087 baseline is 1000ms; tune per project if needed.
      debounceMs: 1000
  access:
    allowedUserIds:
      - ${USER_MARCO_IPHONE_ID}
      - ${USER_MARCO_ANDROID_ID}
  engine:
    name: opencode
    model: opencode/gpt-5-nano
    # enforceCwd: false  # optional; default true. Disable only for intentional cross-directory workflows.
  transcription:
    model: base.en
projects:
  copilot:
    active: false
    cwd: ./copilot
    telegram:
      botToken: ${HAL_COPILOR_CODE_TELEGRAM_TOKEN}
    engine:
      name: copilot
      # session: "user"
    commands:
      git:
        enabled: true
        showInMenu: true
        showInHelp: true
        # whitelist:
        #   - status
        #   - add
        #   - commit
        #   - push
        #   - pull
      npm:
        enabled: true
        showInMenu: true
        showInHelp: true
        whitelist:
          - hello
          - doesNotExist
  opencode:
    active: false
    cwd: ./opencode
    engine:
      name: opencode
    telegram:
      botToken: ${HAL_OPENCODE_TELEGRAM_TOKEN}
  claude-code:
    active: false
    cwd: ./claude-code
    engine:
      name: claude
      # model: stepfun/step-3.5-flash:free
      # envFile: .env  # optional; path to env file sourced before running engine CLI (relative to cwd, or absolute)
    telegram:
      botToken: ${HAL_CLAUDE_CODE_TELEGRAM_TOKEN}
  claude-code-or:
    active: true
    cwd: ./claude-code-or
    engine:
      name: claude
      envFile: .env  # optional: path to env file sourced before running engine CLI (relative to cwd, or absolute)
      model: openrouter/free # optional: you can specify the model here or in the settings.json (settings.json takes precedence)
    telegram:
      botToken: ${HAL_CLAUDE_CODE_OR_TELEGRAM_TOKEN}
  codex:
    active: false
    cwd: ./codex
    engine:
      name: codex
      # session: "user"
    telegram:
      botToken: ${HAL_CODEX_TELEGRAM_TOKEN}
