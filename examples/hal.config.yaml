providers:
  claude: null
  codex: null
  opencode: null
  antigravity: null
  copilot:
    - name: gpt-5-mini
      default: true
    - name: gpt-5.2
    - name: gpt-5.1-codex-mini
    - name: gpt-5.3-codex
globals:
  access:
    allowedUserIds:
      - ${USER_MARCO_IPHONE_ID}
  engine:
    name: opencode
    model: opencode/gpt-5-nano
projects:
  copilot:
    active: true
    cwd: ./copilot
    telegram:
      botToken: ${HAL_COPILOR_CODE_TELEGRAM_TOKEN}
    engine:
      name: copilot
    commands:
      npm:
        enabled: true
        whitelist:
          - tunnel:start
          - tunnel:stop
          - tunnel:logs
          - hello
  opencode:
    active: true
    cwd: ./opencode
    engine:
      name: opencode
    telegram:
      botToken: ${HAL_OPENCODE_TELEGRAM_TOKEN}
  claude-code:
    active: true
    cwd: ./claude-code
    engine:
      name: claude
    telegram:
      botToken: ${HAL_CLAUDE_CODE_TELEGRAM_TOKEN}
  codex:
    active: true
    cwd: ./codex
    engine:
      name: codex
    telegram:
      botToken: ${HAL_CODEX_TELEGRAM_TOKEN}
  antigravity:
    active: true
    cwd: ./antigravity
    engine:
      name: antigravity
    telegram:
      botToken: ${HAL_ANTIGRAVITY_TELEGRAM_TOKEN}
  cursor:
    active: true
    cwd: ./cursor
    engine:
      name: cursor
    telegram:
      botToken: ${HAL_CURSOR_TELEGRAM_TOKEN}




