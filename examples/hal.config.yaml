providers:
  cursor: null
  claude: null
  codex: null
  opencode: null
  antigravity: null
  copilot:
    - name: gpt-5-mini
      default: true
    - name: gpt-5.2
    - name: gpt-5.1-codex-mini
    - name: gpt-5.3-codex
globals:
  access:
    allowedUserIds:
      - ${USER_MARCO_IPHONE_ID}
      - ${USER_MARCO_ANDROID_ID}
  engine:
    name: opencode
    model: opencode/gpt-5-nano
  transcription:
    model: base.en
projects:
  copilot:
    active: true
    cwd: ./copilot
    telegram:
      botToken: ${HAL_COPILOR_CODE_TELEGRAM_TOKEN}
    engine:
      name: copilot
    commands:
      npm:
        enabled: true
        whitelist:
          - tunnel:stop
          - tunnel:start
          - tunnel:logs
          - hello
  opencode:
    active: false
    cwd: ./opencode
    engine:
      name: opencode
    telegram:
      botToken: ${HAL_OPENCODE_TELEGRAM_TOKEN}
  claude-code:
    active: false
    cwd: ./claude-code
    engine:
      name: claude
      # model: stepfun/step-3.5-flash:free
      # envFile: .env  # optional; path to env file sourced before running engine CLI (relative to cwd, or absolute)
    telegram:
      botToken: ${HAL_CLAUDE_CODE_TELEGRAM_TOKEN}
  codex:
    active: true
    cwd: ./codex
    engine:
      name: codex
      # session: "user"
    telegram:
      botToken: ${HAL_CODEX_TELEGRAM_TOKEN}
  antigravity:
    active: false
    cwd: ./antigravity
    engine:
      name: antigravity
    telegram:
      botToken: ${HAL_ANTIGRAVITY_TELEGRAM_TOKEN}
  # cursor:
  #   active: false
  #   cwd: ./cursor
  #   engine:
  #     name: cursor
  #   telegram:
  #     botToken: ${HAL_CURSOR_TELEGRAM_TOKEN}
  blog:
    active: false
    cwd: ./blog
    engine:
      name: claude
    telegram:
      botToken: ${HAL_BLOG_TELEGRAM_TOKEN}




